services:
  web:
    image: node:20-alpine
    container_name: jenkins-web-app
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "4000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/devops_assignment_db
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: jenkins-mongo-db
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
