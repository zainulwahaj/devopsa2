services:
  web_part2:
    image: node:20-alpine
    container_name: jenkins-web-app
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "4000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo_part2:27017/devops_assignment_db_part2
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - mongo_part2
    restart: unless-stopped

  mongo_part2:
    image: mongo:7
    container_name: jenkins-mongo-db
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_part2:/data/db
    restart: unless-stopped

volumes:
  mongo_data_part2:
